name: bench_reducescatter_rmsnorm
file: $KERNEL_BENCHMARKS_ROOT/gpu/comm/bench_reducescatter_rmsnorm.mojo

# Two-launch reduce-scatter -> RMSNorm baseline (bf16 in/out, no FP8). Sweeps
# the MiniMax-M3-MXFP4 TP4 shapes: H=6144, ngpus=4, decode M in {1,8,16,32}
# and prefill M in {2048,4096}. Reports t_RS, t_norm(shard), the cold sum, and
# the chained-warm RS->norm baseline the fused kernel must beat.
params:
  - in_dtype: [DType.bfloat16]
    num_gpus: [4]
    quantize: [False]
    $num_rows: [1, 8, 16, 32, 2048, 4096]
    num_cols: [6144]
